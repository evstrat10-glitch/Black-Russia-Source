name: Build Game

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android NDK r21e
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Build JNI libraries with fixed flags
        run: |
          cd "Jni source"
          ndk-build NDK_DEBUG=0 APP_PLATFORM=android-16 APP_STL=c++_shared -j2

      - name: Upload libraries
        uses: actions/upload-artifact@v4
        with:
          name: game-libs
          path: Jni source/libs/
